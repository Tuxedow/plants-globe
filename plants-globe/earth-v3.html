<!DOCTYPE html>

<head>

    <title>全球植物分布 - 进阶版 v3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: relative; }
        
        /* 标题 */
        #title { 
            position: absolute; top: 24px; left: 50%; transform: translateX(-50%); 
            color: white; font-size: 32px; font-weight: 200; letter-spacing: 4px; 
            z-index: 100; text-shadow: 0 2px 30px rgba(0,0,0,0.8); 
            font-family: 'Helvetica Neue', sans-serif;
        }
        #subtitle { 
            position: absolute; top: 68px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 2px;
            z-index: 100; text-transform: uppercase;
        }
        
        /* 筛选面板 */
        #filters { 
            position: absolute; top: 110px; left: 24px; 
            background: rgba(15,20,30,0.92); padding: 24px; border-radius: 20px; 
            color: white; z-index: 100; min-width: 240px; 
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        #filters h3 { margin: 0 0 20px 0; font-size: 14px; color: #4CAF50; font-weight: 500; letter-spacing: 1px; }
        .filter-group { margin-bottom: 18px; }
        .filter-group label { display: block; margin-bottom: 10px; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1.5px; }
        .filter-group select { 
            width: 100%; padding: 12px 16px; background: rgba(30,40,55,0.9); 
            border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 10px; 
            cursor: pointer; font-size: 14px; transition: all 0.3s;
        }
        .filter-group select:hover { border-color: #4CAF50; background: rgba(40,50,65,0.9); }
        
        /* 统计 */
        #stats { 
            position: absolute; bottom: 30px; left: 24px; 
            background: rgba(15,20,30,0.92); padding: 20px 28px; border-radius: 16px; 
            color: white; z-index: 100; backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.08);
            display: flex; gap: 30px;
        }
        #stats .stat-item { text-align: center; }
        #stats .stat-value { font-size: 28px; font-weight: 600; color: #4CAF50; }
        #stats .stat-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
        
        /* 弹窗详情 */
        #detail-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10,15,25,0.97); border-radius: 24px; 
            color: white; z-index: 300; min-width: 380px; max-width: 420px;
            backdrop-filter: blur(30px); border: 1px solid rgba(76,175,80,0.3);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 80px rgba(76,175,80,0.1);
            display: none; overflow: hidden;
        }
        #detail-panel.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translate(-50%,-48%); } to { opacity:1; transform:translate(-50%,-50%); } }
        
        .detail-header { 
            background: linear-gradient(135deg, rgba(76,175,80,0.2), rgba(76,175,80,0.05)); 
            padding: 28px 28px 20px; border-bottom: 1px solid rgba(255,255,255,0.08);
            position: relative;
        }
        .detail-header h2 { font-size: 26px; font-weight: 400; color: #4CAF50; margin-bottom: 4px; }
        .detail-header .scientific { font-size: 14px; color: rgba(255,255,255,0.5); font-style: italic; }
        .detail-close { 
            position: absolute; top: 20px; right: 20px; width: 36px; height: 36px; 
            background: rgba(255,255,255,0.1); border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 20px; color: #666;
            transition: all 0.3s;
        }
        .detail-close:hover { background: rgba(255,255,255,0.2); color: white; }
        
        .detail-body { padding: 24px 28px; }
        .detail-row { display: flex; margin-bottom: 16px; align-items: flex-start; }
        .detail-row .label { min-width: 60px; font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        .detail-row .value { font-size: 15px; color: white; flex: 1; }
        .detail-row .value.type-tag { 
            display: inline-block; padding: 4px 12px; background: rgba(76,175,80,0.2); 
            border-radius: 20px; font-size: 13px; color: #4CAF50; 
        }
        
        .detail-feature { 
            margin-top: 20px; padding: 16px; background: rgba(255,255,255,0.03); 
            border-radius: 12px; border-left: 3px solid #4CAF50;
        }
        .detail-feature .label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .detail-feature .text { font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.6; }
        
        /* 图例 */
        #legend { 
            position: absolute; bottom: 30px; right: 24px; 
            background: rgba(15,20,30,0.92); padding: 20px 24px; border-radius: 16px; 
            color: white; z-index: 100; backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.08);
        }
        #legend h4 { margin: 0 0 16px 0; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1.5px; }
        .legend-item { display: flex; align-items: center; margin: 10px 0; font-size: 13px; }
        .legend-dot { 
            width: 12px; height: 12px; border-radius: 50%; margin-right: 12px; 
            box-shadow: 0 0 12px currentColor;
        }
        
        /* 控制提示 */
        #hint {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.35); font-size: 12px; z-index: 100;
            display: flex; gap: 24px;
        }
        #hint span { display: flex; align-items: center; gap: 6px; }
        
        /* 加载 */
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #4CAF50; font-size: 16px; z-index: 300;
            display: flex; flex-direction: column; align-items: center; gap: 16px;
        }
        .spinner { width: 36px; height: 36px; border: 2px solid rgba(76,175,80,0.2); border-top-color: #4CAF50; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

            <div class="filter-group">

                    <option value="南非">🇿🇦 南非</option>
                    <option value="澳大利亚">🇦🇺 澳大利亚</option>
                </select>
            </div>
        </div>
        
        <div id="stats">
            <div class="stat-item"><div class="stat-value" id="totalCount">0</div><div class="stat-label">植物总数</div></div>
            <div class="stat-item"><div class="stat-value" id="showCount">0</div><div class="stat-label">显示数量</div></div>
            <div class="stat-item"><div class="stat-value" id="countryCount">0</div><div class="stat-label">国家数量</div></div>
        </div>
        
        <div id="legend">
            <h4>类型图例</h4>
            <div class="legend-item"><div class="legend-dot" style="background:#FF6B6B;color:#FF6B6B;"></div>花卉</div>
            <div class="legend-item"><div class="legend-dot" style="background:#4CAF50;color:#4CAF50;"></div>乔木</div>
            <div class="legend-item"><div class="legend-dot" style="background:#FFB347;color:#FFB347;"></div>灌木</div>
            <div class="legend-item"><div class="legend-dot" style="background:#87CEEB;color:#87CEEB;"></div>多肉</div>
            <div class="legend-item"><div class="legend-dot" style="background:#DDA0DD;color:#DDA0DD;"></div>草本</div>
        </div>
        
        <div id="hint">

            <span>🖱️ 滚轮缩放</span>
            <span>👆 点击查看详情</span>
        </div>
        
        <!-- 详情弹窗 -->
        <div id="detail-panel">

                <h2 id="detailName">植物名称</h2>
                <div class="scientific" id="detailScientific">学名</div>
                <div class="detail-close" onclick="closeDetail()">×</div>
            </div>
            <div class="detail-body">

                    <div class="value"><span class="type-tag" id="detailType">类型</span></div>
                </div>
                <div class="detail-row">
                    <div class="label">气候</div>
                    <div class="value" id="detailClimate">气候</div>
                </div>
                <div class="detail-row">

                    <div class="value" id="detailCountry">国家</div>
                </div>
                <div class="detail-row">

                    <div class="value" id="detailLocation">经纬度</div>
                </div>
                <div class="detail-feature">
                    <div class="label">特征描述</div>
                    <div class="text" id="detailFeature">特征</div>
                </div>
            </div>
        </div>
    </div>

{name:"金合欢",scientific:"Acacia pycnantha",type:"乔木",climate:"亚热带",country:"澳大利亚",lat:-33.87,lon:151.21,feature:"澳大利亚国花，金黄色小球花。"},
];

// Three.js 场景
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 2.8;

const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 1.3;
controls.maxDistance = 6;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;

// 地球
const earthGeo = new THREE.SphereGeometry(1, 128, 128);
const earthMat = new THREE.MeshPhongMaterial({
    color: 0x1e4d6b,
    emissive: 0x0a1f30,
    specular: 0x222222,
    shininess: 25,
});
const earth = new THREE.Mesh(earthGeo, earthMat);
scene.add(earth);

// 大气层光晕
const glowGeo = new THREE.SphereGeometry(1.06, 64, 64);
const glowMat = new THREE.MeshBasicMaterial({
    color: 0x4fc3f7,
    transparent: true,
    opacity: 0.08,
    side: THREE.BackSide
});
const glow = new THREE.Mesh(glowGeo, glowMat);
scene.add(glow);

// 外圈光晕
const outerGlowGeo = new THREE.SphereGeometry(1.12, 64, 64);
const outerGlowMat = new THREE.MeshBasicMaterial({
    color: 0x2196F3,
    transparent: true,
    opacity: 0.03,
    side: THREE.BackSide
});
const outerGlow = new THREE.Mesh(outerGlowGeo, outerGlowMat);
scene.add(outerGlow);

// 光照
const ambient = new THREE.AmbientLight(0x404050, 1.2);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffffff, 1.3);
sun.position.set(5, 3, 5);
scene.add(sun);
const fill = new THREE.DirectionalLight(0x4488ff, 0.4);
fill.position.set(-5, -3, -5);
scene.add(fill);

// 星空
const starsGeo = new THREE.BufferGeometry();
const starsPos = new Float32Array(3000*3);
for(let i=0;i<starsPos.length;i++) starsPos[i] = (Math.random()-0.5)*100;
starsGeo.setAttribute('position',new THREE.BufferAttribute(starsPos,3));
const stars = new THREE.Points(starsGeo,new THREE.PointsMaterial({color:0xffffff,size:0.04,transparent:true,opacity:0.6}));
scene.add(stars);

// 标记
const markerGroup = new THREE.Group();
scene.add(markerGroup);

const typeColors = {
    '花卉': 0xFF6B6B,
    '乔木': 0x4CAF50,
    '灌木': 0xFFB347,
    '多肉': 0x87CEEB,
    '草本': 0xDDA0DD,
    '藤本': 0x98D8C8
};

function createMarker(plant) {
    const color = typeColors[plant.type] || 0xFFFFFF;
    const group = new THREE.Group();
    
    // 外圈光晕
    const glowGeo = new THREE.CircleGeometry(0.035, 24);
    const glowMat = new THREE.MeshBasicMaterial({color:color,transparent:true,opacity:0.35});
    const glowMesh = new THREE.Mesh(glowGeo, glowMat);
    
    // 内圈
    const innerGeo = new THREE.CircleGeometry(0.018, 24);
    const innerMat = new THREE.MeshBasicMaterial({color:0xffffff});
    const innerMesh = new THREE.Mesh(innerGeo, innerMat);
    innerMesh.position.z = 0.001;
    
    // 脉冲圈
    const pulseGeo = new THREE.RingGeometry(0.025, 0.035, 24);
    const pulseMat = new THREE.MeshBasicMaterial({color:color,transparent:true,opacity:0.5,side:THREE.DoubleSide});
    const pulseMesh = new THREE.Mesh(pulseGeo, pulseMat);
    
    group.add(glowMesh, innerMesh, pulseMesh);
    
    // 经纬度转3D
    const lat = plant.lat * Math.PI / 180;
    const lon = -plant.lon * Math.PI / 180;
    const r = 1.025;
    group.position.set(r*Math.cos(lat)*Math.sin(lon), r*Math.sin(lat), r*Math.cos(lat)*Math.cos(lon));
    group.lookAt(0,0,0);
    group.rotateX(Math.PI/2);
    
    group.userData = {...plant, pulse: pulseMesh, baseOpacity: 0.5};
    return group;
}

function updateMarkers() {
    while(markerGroup.children.length) markerGroup.remove(markerGroup.children[0]);
    
    const tf = document.getElementById('typeFilter').value;
    const cf = document.getElementById('climateFilter').value;
    const cof = document.getElementById('countryFilter').value;
    
    let show = 0;
    const countries = new Set();
    
    plantsData.forEach(p => {
        if(tf!=='all'&&p.type!==tf) return;
        if(cf!=='all'&&p.climate!==cf) return;
        if(cof!=='all'&&p.country!==cof) return;
        
        markerGroup.add(createMarker(p));
        countries.add(p.country);
        show++;
    });
    
    document.getElementById('totalCount').textContent = plantsData.length;
    document.getElementById('showCount').textContent = show;
    document.getElementById('countryCount').textContent = countries.size;
}

updateMarkers();
document.getElementById('loading').style.display = 'none';

['typeFilter','climateFilter','countryFilter'].forEach(id => {
    document.getElementById(id).addEventListener('change', updateMarkers);
});

// 点击交互
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('click', e => {
    if(e.target.closest('#filters') || e.target.closest('#detail-panel') || e.target.closest('#legend')) return;
    
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(markerGroup.children, true);
    
    if(hits.length) {
        let marker = hits[0].object;
        while(marker.parent && !marker.userData) marker = marker.parent;
        
        if(marker.userData) {
            showDetail(marker.userData);
            // 聚焦到该位置
            const targetPos = marker.position.clone().normalize().multiplyScalar(2.5);
            controls.target.copy(marker.position);
        }
    }
});

function showDetail(plant) {
    document.getElementById('detailName').textContent = plant.name;
    document.getElementById('detailScientific').textContent = plant.scientific;
    document.getElementById('detailType').textContent = plant.type;
    document.getElementById('detailClimate').textContent = plant.climate;
    document.getElementById('detailCountry').textContent = plant.country;
    document.getElementById('detailLocation').textContent = `纬度 ${plant.lat.toFixed(2)}° / 经度 ${plant.lon.toFixed(2)}°`;
    document.getElementById('detailFeature').textContent = plant.feature;
    document.getElementById('detail-panel').classList.add('active');
}

window.closeDetail = () => {
    document.getElementById('detail-panel').classList.remove('active');
    controls.target.set(0,0,0);
};

// 动画循环
let time = 0;
function animate() {
    requestAnimationFrame(animate);
    time += 0.01;
    
    // 脉冲动画
    markerGroup.children.forEach(m => {
        if(m.userData.pulse) {
            m.userData.pulse.material.opacity = 0.3 + Math.sin(time * 2) * 0.2;
        }
    });
    
    controls.update();
    renderer.render(scene, camera);
}
animate();

// 窗口调整
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
    </script>
</body>
