<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球植物分布 - v4</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: relative; }
        
        /* 标题 */
        #title { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: white; font-size: 28px; font-weight: 200; letter-spacing: 3px; z-index: 100; text-shadow: 0 2px 20px rgba(0,0,0,0.8); }
        
        /* 可折叠筛选面板 */
        #filters { 
            position: absolute; top: 80px; left: 0; 
            background: rgba(10,15,25,0.95); padding: 20px; 
            border-radius: 0 20px 20px 0; color: white; z-index: 100; 
            min-width: 220px; backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.08);
            border-left: none;
            transition: transform 0.3s ease;
        }
        #filters.collapsed { transform: translateX(-180px); }
        #toggle-btn {
            position: absolute; right: -36px; top: 20px;
            width: 36px; height: 36px; background: rgba(10,15,25,0.95);
            border-radius: 0 10px 10px 0; border: 1px solid rgba(255,255,255,0.08);
            border-left: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: #4CAF50; font-size: 18px; transition: all 0.3s;
        }
        #toggle-btn:hover { background: rgba(20,30,40,0.95); }
        
        #filters h3 { margin: 0 0 16px 0; font-size: 13px; color: #4CAF50; font-weight: 500; }
        .filter-group { margin-bottom: 14px; }
        .filter-group label { display: block; margin-bottom: 8px; font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .filter-group select { 
            width: 100%; padding: 10px 12px; background: rgba(30,40,55,0.9); 
            border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; 
            cursor: pointer; font-size: 13px;
        }
        .filter-group select:hover { border-color: #4CAF50; }
        
        /* 统计 */
        #stats { 
            position: absolute; bottom: 20px; left: 20px; 
            background: rgba(10,15,25,0.95); padding: 16px 24px; border-radius: 16px; 
            color: white; z-index: 100; backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.08);
            display: flex; gap: 24px;
        }
        #stats .stat-item { text-align: center; }
        #stats .stat-value { font-size: 24px; font-weight: 600; color: #4CAF50; }
        #stats .stat-label { font-size: 10px; color: #666; text-transform: uppercase; margin-top: 2px; }
        
        /* 详情弹窗 */
        #detail-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10,15,25,0.97); border-radius: 20px; 
            color: white; z-index: 300; min-width: 360px;
            backdrop-filter: blur(30px); border: 1px solid rgba(76,175,80,0.3);
            display: none; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        #detail-panel.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translate(-50%,-48%); } to { opacity:1; transform:translate(-50%,-50%); } }
        
        .detail-header { padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.08); position: relative; }
        .detail-header h2 { font-size: 24px; font-weight: 400; color: #4CAF50; margin: 0; }
        .detail-header .scientific { font-size: 13px; color: rgba(255,255,255,0.5); font-style: italic; margin-top: 4px; }
        .detail-close { 
            position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; 
            background: rgba(255,255,255,0.1); border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 18px; color: #666;
        }
        .detail-close:hover { background: rgba(255,255,255,0.2); color: white; }
        
        .detail-body { padding: 20px 24px; }
        .detail-row { display: flex; margin-bottom: 12px; }
        .detail-row .label { min-width: 50px; font-size: 10px; color: #555; text-transform: uppercase; }
        .detail-row .value { font-size: 14px; }
        .detail-row .type-tag { display: inline-block; padding: 3px 10px; background: rgba(76,175,80,0.2); border-radius: 20px; font-size: 12px; color: #4CAF50; }
        .detail-feature { margin-top: 16px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 10px; border-left: 3px solid #4CAF50; }
        .detail-feature .label { font-size: 10px; color: #555; text-transform: uppercase; }
        .detail-feature .text { font-size: 13px; color: rgba(255,255,255,0.8); margin-top: 6px; line-height: 1.5; }
        
        /* 图例 */
        #legend { 
            position: absolute; bottom: 20px; right: 20px; 
            background: rgba(10,15,25,0.95); padding: 16px 20px; border-radius: 16px; 
            color: white; z-index: 100; backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.08);
        }
        #legend h4 { margin: 0 0 12px 0; font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .legend-item { display: flex; align-items: center; margin: 8px 0; font-size: 12px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; }
        
        /* 控制提示 */
        #hint { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.35); font-size: 11px; z-index: 100; display: flex; gap: 20px; }
        
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #4CAF50; font-size: 16px; z-index: 300; }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div id="title">🌍 全球植物分布</div>
        
        <div id="loading">加载地球...</div>
        
        <!-- 可折叠筛选面板 -->
        <div id="filters">
            <div id="toggle-btn" onclick="toggleFilters()">◀</div>
            <h3>🔍 筛选</h3>
            <div class="filter-group">
                <label>类型</label>
                <select id="typeFilter">
                    <option value="all">全部</option>
                    <option value="花卉">花卉</option>
                    <option value="乔木">乔木</option>
                    <option value="灌木">灌木</option>
                    <option value="多肉">多肉</option>
                    <option value="草本">草本</option>
                </select>
            </div>
            <div class="filter-group">
                <label>气候</label>
                <select id="climateFilter">
                    <option value="all">全部</option>
                    <option value="温带">温带</option>
                    <option value="热带">热带</option>
                    <option value="亚热带">亚热带</option>
                    <option value="地中海">地中海</option>
                    <option value="干旱">干旱</option>
                </select>
            </div>
            <div class="filter-group">
                <label>国家</label>
                <select id="countryFilter">
                    <option value="all">全部</option>
                    <option value="中国">中国</option>
                    <option value="美国">美国</option>
                    <option value="日本">日本</option>
                    <option value="法国">法国</option>
                    <option value="墨西哥">墨西哥</option>
                    <option value="巴西">巴西</option>
                    <option value="南非">南非</option>
                    <option value="澳大利亚">澳大利亚</option>
                </select>
            </div>
        </div>
        
        <div id="stats">
            <div class="stat-item"><div class="stat-value" id="totalCount">0</div><div class="stat-label">总数</div></div>
            <div class="stat-item"><div class="stat-value" id="showCount">0</div><div class="stat-label">显示</div></div>
        </div>
        
        <div id="legend">
            <h4>类型</h4>
            <div class="legend-item"><div class="legend-dot" style="background:#FF6B6B;"></div>花卉</div>
            <div class="legend-item"><div class="legend-dot" style="background:#4CAF50;"></div>乔木</div>
            <div class="legend-item"><div class="legend-dot" style="background:#FFB347;"></div>灌木</div>
            <div class="legend-item"><div class="legend-dot" style="background:#87CEEB;"></div>多肉</div>
            <div class="legend-item"><div class="legend-dot" style="background:#DDA0DD;"></div>草本</div>
        </div>
        
        <div id="hint">
            <span>🖱️ 拖拽旋转</span>
            <span>🖱️ 滚轮缩放</span>
            <span>👆 点击详情</span>
        </div>
        
        <!-- 详情弹窗 -->
        <div id="detail-panel">
            <div class="detail-header">
                <h2 id="detailName">名称</h2>
                <div class="scientific" id="detailScientific">学名</div>
                <div class="detail-close" onclick="closeDetail()">×</div>
            </div>
            <div class="detail-body">
                <div class="detail-row"><div class="label">类型</div><div class="value"><span class="type-tag" id="detailType">类型</span></div></div>
                <div class="detail-row"><div class="label">气候</div><div class="value" id="detailClimate">气候</div></div>
                <div class="detail-row"><div class="label">分布</div><div class="value" id="detailCountry">国家</div></div>
                <div class="detail-row"><div class="label">位置</div><div class="value" id="detailLocation">坐标</div></div>
                <div class="detail-feature">
                    <div class="label">特征</div>
                    <div class="text" id="detailFeature">描述</div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
    <script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const plantsData = [
// 中国
{name:"桂花",scientific:"Osmanthus fragrans",type:"乔木",climate:"温带",country:"中国",lat:35.86,lon:104.19,feature:"中国传统名花，花香浓郁。"},
{name:"牡丹",scientific:"Paeonia suffruticosa",type:"灌木",climate:"温带",country:"中国",lat:34.74,lon:113.62,feature:"中国国花，花中之王。"},
{name:"梅花",scientific:"Prunus mume",type:"乔木",climate:"温带",country:"中国",lat:34.34,lon:108.94,feature:"岁寒三友之一。"},
{name:"兰花",scientific:"Cymbidium",type:"草本",climate:"亚热带",country:"中国",lat:30.57,lon:114.30,feature:"十大名花之首。"},
{name:"菊花",scientific:"Chrysanthemum",type:"草本",climate:"温带",country:"中国",lat:39.90,lon:116.41,feature:"四君子之一。"},
{name:"杜鹃",scientific:"Rhododendron",type:"灌木",climate:"亚热带",country:"中国",lat:27.83,lon:112.94,feature:"世界四大高山花卉。"},
{name:"荷花",scientific:"Nelumbo nucifera",type:"草本",climate:"温带",country:"中国",lat:30.57,lon:114.30,feature:"出淤泥而不染。"},
{name:"竹子",scientific:"Bambusoideae",type:"乔木",climate:"亚热带",country:"中国",lat:29.56,lon:106.55,feature:"四君子之一。"},
{name:"银杏",scientific:"Ginkgo biloba",type:"乔木",climate:"温带",country:"中国",lat:34.34,lon:108.94,feature:"活化石植物。"},
{name:"红豆杉",scientific:"Taxus chinensis",type:"乔木",climate:"温带",country:"中国",lat:32.08,lon:118.80,feature:"国家一级保护。"},
{name:"水杉",scientific:"Metasequoia",type:"乔木",climate:"亚热带",country:"中国",lat:30.67,lon:114.35,feature:"活化石。"},
{name:"雪莲",scientific:"Saussurea",type:"草本",climate:"寒带",country:"中国",lat:43.10,lon:87.55,feature:"天山雪莲。"},
{name:"人参",scientific:"Panax ginseng",type:"草本",climate:"温带",country:"中国",lat:41.80,lon:125.40,feature:"百草之王。"},
// 美国
{name:"玫瑰",scientific:"Rosa rugosa",type:"灌木",climate:"温带",country:"美国",lat:38.90,lon:-77.04,feature:"爱情之花。"},
{name:"巨杉",scientific:"Sequoiadendron",type:"乔木",climate:"温带",country:"美国",lat:36.58,lon:-118.29,feature:"世界最大树。"},
{name:"红杉",scientific:"Sequoia sempervirens",type:"乔木",climate:"温带",country:"美国",lat:37.87,lon:-122.27,feature:"海岸红杉。"},
{name:"金盏菊",scientific:"Calendula",type:"草本",climate:"温带",country:"美国",lat:34.05,lon:-118.24,feature:"富含维生素。"},
{name:"仙人掌",scientific:"Cactaceae",type:"多肉",climate:"干旱",country:"美国",lat:32.73,lon:-117.16,feature:"沙漠植物。"},
// 日本
{name:"樱花",scientific:"Prunus serrulata",type:"乔木",climate:"温带",country:"日本",lat:35.68,lon:139.69,feature:"日本国花。"},
{name:"红叶",scientific:"Acer palmatum",type:"乔木",climate:"温带",country:"日本",lat:35.01,lon:135.76,feature:"日本红枫。"},
// 法国
{name:"薰衣草",scientific:"Lavandula",type:"灌木",climate:"地中海",country:"法国",lat:46.23,lon:2.21,feature:"普罗旺斯象征。"},
{name:"橄榄",scientific:"Olea europaea",type:"乔木",climate:"地中海",country:"法国",lat:43.93,lon:7.26,feature:"和平象征。"},
// 墨西哥
{name:"龙舌兰",scientific:"Agave americana",type:"多肉",climate:"干旱",country:"墨西哥",lat:23.63,lon:-102.55,feature:"酿酒原料。"},
{name:"巨人柱",scientific:"Carnegiea gigantea",type:"多肉",climate:"干旱",country:"墨西哥",lat:31.78,lon:-111.13,feature:"世界最高仙人掌。"},
// 巴西
{name:"巴西木",scientific:"Dracaena",type:"乔木",climate:"热带",country:"巴西",lat:-15.78,lon:-47.93,feature:"幸福之树。"},
{name:"蝴蝶兰",scientific:"Phalaenopsis",type:"草本",climate:"热带",country:"巴西",lat:-23.55,lon:-46.63,feature:"洋兰皇后。"},
// 南非
{name:"金合欢",scientific:"Acacia",type:"乔木",climate:"热带",country:"南非",lat:-30.56,lon:22.94,feature:"非洲典型树种。"},
{name:"猴面包树",scientific:"Adansonia digitata",type:"乔木",climate:"热带",country:"南非",lat:-22.56,lon:17.08,feature:"非洲生命之树。"},
{name:"帝王花",scientific:"Protea cynaroides",type:"灌木",climate:"地中海",country:"南非",lat:-33.92,lon:18.42,feature:"南非国花。"},
// 澳大利亚
{name:"桉树",scientific:"Eucalyptus",type:"乔木",climate:"亚热带",country:"澳大利亚",lat:-25.27,lon:133.78,feature:"考拉主食。"},
];

// 场景
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 2.8;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// 控制器 - 围绕地球中心旋转
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 1.5;
controls.maxDistance = 5;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;
controls.enablePan = false; // 禁用平移，只允许旋转

// 加载地球纹理
const textureLoader = new THREE.TextureLoader();
const earthGroup = new THREE.Group();
scene.add(earthGroup);

// 地球
const earthGeo = new THREE.SphereGeometry(1, 64, 64);
const earthMat = new THREE.MeshPhongMaterial({
    color: 0x1e90ff,
    specular: 0x111111,
    shininess: 10,
});
const earth = new THREE.Mesh(earthGeo, earthMat);
earthGroup.add(earth);

// 加载地球贴图
textureLoader.load(
    'https://unpkg.com/three-globe@2.31.0/example/img/earth-blue-marble.jpg',
    texture => {
        earth.material.map = texture;
        earth.material.needsUpdate = true;
    },
    undefined,
    err => console.log('贴图加载失败，使用蓝色')
);

// 大气层
const atmoGeo = new THREE.SphereGeometry(1.02, 64, 64);
const atmoMat = new THREE.MeshBasicMaterial({
    color: 0x4fc3f7,
    transparent: true,
    opacity: 0.1,
    side: THREE.BackSide
});
earthGroup.add(new THREE.Mesh(atmoGeo, atmoMat));

// 光照
scene.add(new THREE.AmbientLight(0x404050, 1.0));
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(5, 3, 5);
scene.add(sun);

// 星空
const starsGeo = new THREE.BufferGeometry();
const stars = new Float32Array(2000*3);
for(let i=0;i<stars.length;i++) stars[i] = (Math.random()-0.5)*80;
starsGeo.setAttribute('position',new THREE.BufferAttribute(stars,3));
scene.add(new THREE.Points(starsGeo,new THREE.PointsMaterial({color:0xffffff,size:0.04,opacity:0.5,transparent:true})));

// 标记
const markerGroup = new THREE.Group();
earthGroup.add(markerGroup);

const typeColors = {'花卉':0xFF6B6B,'乔木':0x4CAF50,'灌木':0xFFB347,'多肉':0x87CEEB,'草本':0xDDA0DD};

function createMarker(p) {
    const color = typeColors[p.type]||0xFFFFFF;
    const group = new THREE.Group();
    
    // 外圈
    const glow = new THREE.Mesh(
        new THREE.CircleGeometry(0.03, 16),
        new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.5})
    );
    // 核心
    const core = new THREE.Mesh(
        new THREE.CircleGeometry(0.015, 16),
        new THREE.MeshBasicMaterial({color:0xffffff})
    );
    core.position.z = 0.001;
    
    group.add(glow, core);
    
    const lat = p.lat*Math.PI/180, lon = -p.lon*Math.PI/180, r = 1.01;
    group.position.set(r*Math.cos(lat)*Math.sin(lon), r*Math.sin(lat), r*Math.cos(lat)*Math.cos(lon));
    group.lookAt(0,0,0);
    group.rotateX(Math.PI/2);
    group.userData = p;
    return group;
}

function updateMarkers() {
    while(markerGroup.children.length) markerGroup.remove(markerGroup.children[0]);
    const tf = document.getElementById('typeFilter').value;
    const cf = document.getElementById('climateFilter').value;
    const cof = document.getElementById('countryFilter').value;
    let count = 0;
    plantsData.forEach(p => {
        if(tf!=='all'&&p.type!==tf) return;
        if(cf!=='all'&&p.climate!==cf) return;
        if(cof!=='all'&&p.country!==cof) return;
        markerGroup.add(createMarker(p));
        count++;
    });
    document.getElementById('totalCount').textContent = plantsData.length;
    document.getElementById('showCount').textContent = count;
}

updateMarkers();
document.getElementById('loading').style.display = 'none';

['typeFilter','climateFilter','countryFilter'].forEach(id => {
    document.getElementById(id).addEventListener('change', updateMarkers);
});

// 面板折叠
window.toggleFilters = function() {
    const f = document.getElementById('filters');
    const btn = document.getElementById('toggle-btn');
    f.classList.toggle('collapsed');
    btn.textContent = f.classList.contains('collapsed') ? '▶' : '◀';
};

// 点击详情
const raycaster = new THREE.Raycaster();
window.addEventListener('click', e => {
    if(e.target.closest('#filters') || e.target.closest('#detail-panel') || e.target.closest('#legend')) return;
    
    raycaster.setFromCamera(new THREE.Vector2((e.clientX/window.innerWidth)*2-1,-(e.clientY/window.innerHeight)*2+1),camera);
    const hits = raycaster.intersectObjects(markerGroup.children,true);
    if(hits.length){
        let m = hits[0].object;
        while(m.parent && !m.userData) m = m.parent;
        if(m.userData){
            showDetail(m.userData);
        }
    }
});

function showDetail(p){
    document.getElementById('detailName').textContent = p.name;
    document.getElementById('detailScientific').textContent = p.scientific;
    document.getElementById('detailType').textContent = p.type;
    document.getElementById('detailClimate').textContent = p.climate;
    document.getElementById('detailCountry').textContent = p.country;
    document.getElementById('detailLocation').textContent = `${p.lat.toFixed(2)}° / ${p.lon.toFixed(2)}°`;
    document.getElementById('detailFeature').textContent = p.feature;
    document.getElementById('detail-panel').classList.add('active');
}
window.closeDetail = () => document.getElementById('detail-panel').classList.remove('active');

// 动画
function animate(){
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});
    </script>
</body>
</html>
