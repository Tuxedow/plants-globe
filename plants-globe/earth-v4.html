<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球植物分布 - v4</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
        #container{width:100vw;height:100vh;position:relative}
        #title{position:absolute;top:20px;left:50%;transform:translateX(-50%);color:#fff;font-size:28px;font-weight:200;letter-spacing:3px;z-index:100;text-shadow:0 2px 20px rgba(0,0,0,0.8)}
        #filters{position:absolute;top:80px;left:0;background:rgba(10,15,25,0.95);padding:20px;border-radius:0 20px 20px 0;color:#fff;z-index:100;min-width:200px;backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);transition:transform 0.3s}
        #filters.collapsed{transform:translateX(-160px)}
        #toggle{position:absolute;right:-32px;top:20px;width:32px;height:32px;background:rgba(10,15,25,0.95);border-radius:0 8px 8px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#4CAF50;font-size:16px}
        #filters h3{margin:0 0 14px 0;font-size:13px;color:#4CAF50}
        .grp{margin-bottom:12px}
        .grp label{display:block;margin-bottom:6px;font-size:10px;color:#666;text-transform:uppercase}
        .grp select{width:100%;padding:10px;background:rgba(30,40,55,0.9);border:1px solid rgba(255,255,255,0.1);color:#fff;border-radius:8px;cursor:pointer;font-size:13px}
        #stats{position:absolute;bottom:20px;left:20px;background:rgba(10,15,25,0.95);padding:14px 20px;border-radius:14px;color:#fff;z-index:100;display:flex;gap:20px}
        #stats .item{text-align:center}
        #stats .val{font-size:22px;font-weight:600;color:#4CAF50}
        #stats .lbl{font-size:10px;color:#666;text-transform:uppercase}
        #legend{position:absolute;bottom:20px;right:20px;background:rgba(10,15,25,0.95);padding:14px 18px;border-radius:14px;color:#fff;z-index:100}
        #legend h4{margin:0 0 10px 0;font-size:10px;color:#666;text-transform:uppercase}
        .leg{display:flex;align-items:center;margin:6px 0;font-size:12px}
        .dot{width:10px;height:10px;border-radius:50%;margin-right:8px}
        #hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.35);font-size:11px;z-index:100}
        #detail{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,15,25,0.97);border-radius:20px;color:#fff;z-index:300;min-width:340px;display:none;box-shadow:0 20px 60px rgba(0,0,0,0.6)}
        #detail.active{display:block;animation:fadeIn 0.3s}
        @keyframes fadeIn{from{opacity:0;transform:translate(-50%,-48%)}to{opacity:1;transform:translate(-50%,-50%)}}
        .d-head{padding:20px;border-bottom:1px solid rgba(255,255,255,0.08);position:relative}
        .d-head h2{font-size:22px;color:#4CAF50;margin:0}
        .d-head .sci{font-size:12px;color:rgba(255,255,255,0.5);font-style:italic;margin-top:4px}
        .d-close{position:absolute;top:14px;right:14px;width:28px;height:28px;background:rgba(255,255,255,0.1);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:#666}
        .d-body{padding:18px}
        .d-row{display:flex;margin-bottom:10px}
        .d-row .l{width:45px;font-size:10px;color:#555;text-transform:uppercase}
        .d-row .v{font-size:13px}
        .tag{display:inline-block;padding:2px 8px;background:rgba(76,175,80,0.2);border-radius:20px;font-size:11px;color:#4CAF50}
        .d-feat{margin-top:12px;padding:10px;background:rgba(255,255,255,0.03);border-radius:8px;border-left:3px solid #4CAF50}
        .d-feat .l{font-size:10px;color:#555;margin-bottom:4px}
        .d-feat .t{font-size:12px;color:rgba(255,255,255,0.8);line-height:1.5}
        #loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#4CAF50;z-index:300}
    </style>
</head>
<body>
    <div id="container">
        <div id="title">🌍 全球植物分布</div>
        <div id="loading">加载中...</div>
        
        <div id="filters">
            <div id="toggle" onclick="toggle()">◀</div>
            <h3>🔍 筛选</h3>
            <div class="grp"><label>类型</label>
                <select id="tf"><option value="all">全部</option><option value="花卉">花卉</option><option value="乔木">乔木</option><option value="灌木">灌木</option><option value="多肉">多肉</option><option value="草本">草本</option></select>
            </div>
            <div class="grp"><label>气候</label>
                <select id="cf"><option value="all">全部</option><option value="温带">温带</option><option value="热带">热带</option><option value="亚热带">亚热带</option><option value="地中海">地中海</option><option value="干旱">干旱</option></select>
            </div>
            <div class="grp"><label>国家</label>
                <select id="cof"><option value="all">全部</option><option value="中国">中国</option><option value="美国">美国</option><option value="日本">日本</option><option value="法国">法国</option><option value="墨西哥">墨西哥</option><option value="巴西">巴西</option><option value="南非">南非</option><option value="澳大利亚">澳大利亚</option></select>
            </div>
        </div>
        
        <div id="stats">
            <div class="item"><div class="val" id="total">0</div><div class="lbl">总数</div></div>
            <div class="item"><div class="val" id="show">0</div><div class="lbl">显示</div></div>
        </div>
        
        <div id="legend">
            <h4>类型</h4>
            <div class="leg"><div class="dot" style="background:#FF6B6B"></div>花卉</div>
            <div class="leg"><div class="dot" style="background:#4CAF50"></div>乔木</div>
            <div class="leg"><div class="dot" style="background:#FFB347"></div>灌木</div>
            <div class="leg"><div class="dot" style="background:#87CEEB"></div>多肉</div>
            <div class="leg"><div class="dot" style="background:#DDA0DD"></div>草本</div>
        </div>
        
        <div id="hint"><span>🖱️ 拖拽旋转</span> <span>🖱️ 滚轮缩放</span> <span>👆 点击详情</span></div>
        
        <div id="detail">
            <div class="d-head">
                <h2 id="dname">名称</h2>
                <div class="sci" id="dsci">学名</div>
                <div class="d-close" onclick="closeD()">×</div>
            </div>
            <div class="d-body">
                <div class="d-row"><div class="l">类型</div><div class="v"><span class="tag" id="dtype">类型</span></div></div>
                <div class="d-row"><div class="l">气候</div><div class="v" id="dcli">气候</div></div>
                <div class="d-row"><div class="l">分布</div><div class="v" id="dcon">国家</div></div>
                <div class="d-row"><div class="l">位置</div><div class="v" id="dloc">坐标</div></div>
                <div class="d-feat"><div class="l">特征</div><div class="t" id="dfeat">描述</div></div>
            </div>
        </div>
    </div>

    <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
    <script type="module">
import*as THREE from'three';
import{OrbitControls}from'three/addons/controls/OrbitControls.js';

const data=[
{name:"桂花",sci:"Osmanthus",type:"乔木",cli:"温带",con:"中国",lat:35.86,lon:104.19,feat:"中国名花"},
{name:"牡丹",sci:"Paeonia",type:"灌木",cli:"温带",con:"中国",lat:34.74,lon:113.62,feat:"中国国花"},
{name:"梅花",sci:"Prunus",type:"乔木",cli:"温带",con:"中国",lat:34.34,lon:108.94,feat:"岁寒三友"},
{name:"兰花",sci:"Cymbidium",type:"草本",cli:"亚热带",con:"中国",lat:30.57,lon:114.3,feat:"十大名花"},
{name:"菊花",sci:"Chrysanthemum",type:"草本",cli:"温带",con:"中国",lat:39.9,lon:116.41,feat:"四君子"},
{name:"杜鹃",sci:"Rhododendron",type:"灌木",cli:"亚热带",con:"中国",lat:27.83,lon:112.94,feat:"高山花卉"},
{name:"荷花",sci:"Nelumbo",type:"草本",cli:"温带",con:"中国",lat:30.57,lon:114.3,feat:"出淤泥不染"},
{name:"竹子",sci:"Bambusa",type:"乔木",cli:"亚热带",con:"中国",lat:29.56,lon:106.55,feat:"四君子"},
{name:"银杏",sci:"Ginkgo",type:"乔木",cli:"温带",con:"中国",lat:34.34,lon:108.94,feat:"活化石"},
{name:"红豆杉",sci:"Taxus",type:"乔木",cli:"温带",con:"中国",lat:32.08,lon:118.8,feat:"一级保护"},
{name:"雪莲",sci:"Saussurea",type:"草本",cli:"寒带",con:"中国",lat:43.1,lon:87.55,feat:"天山雪莲"},
{name:"人参",sci:"Panax",type:"草本",cli:"温带",con:"中国",lat:41.8,lon:125.4,feat:"百草之王"},
{name:"玫瑰",sci:"Rosa",type:"灌木",cli:"温带",con:"美国",lat:38.9,lon:-77.04,feat:"爱情之花"},
{name:"巨杉",sci:"Sequoiadendron",type:"乔木",cli:"温带",con:"美国",lat:36.58,lon:-118.29,feat:"世界最大"},
{name:"红杉",sci:"Sequoia",type:"乔木",cli:"温带",con:"美国",lat:37.87,lon:-122.27,feat:"海岸红杉"},
{name:"樱花",sci:"Prunus",type:"乔木",cli:"温带",con:"日本",lat:35.68,lon:139.69,feat:"日本国花"},
{name:"红叶",sci:"Acer",type:"乔木",cli:"温带",con:"日本",lat:35.01,lon:135.76,feat:"日本红枫"},
{name:"薰衣草",sci:"Lavandula",type:"灌木",cli:"地中海",con:"法国",lat:46.23,lon:2.21,feat:"普罗旺斯"},
{name:"橄榄",sci:"Olea",type:"乔木",cli:"地中海",con:"法国",lat:43.93,lon:7.26,feat:"和平象征"},
{name:"龙舌兰",sci:"Agave",type:"多肉",cli:"干旱",con:"墨西哥",lat:23.63,lon:-102.55,feat:"酿酒原料"},
{name:"巨人柱",sci:"Carnegiea",type:"多肉",cli:"干旱",con:"墨西哥",lat:31.78,lon:-111.13,feat:"最高仙人掌"},
{name:"巴西木",sci:"Dracaena",type:"乔木",cli:"热带",con:"巴西",lat:-15.78,lon:-47.93,feat:"幸福之树"},
{name:"蝴蝶兰",sci:"Phalaenopsis",type:"草本",cli:"热带",con:"巴西",lat:-23.55,lon:-46.63,feat:"洋兰皇后"},
{name:"金合欢",sci:"Acacia",type:"乔木",cli:"热带",con:"南非",lat:-30.56,lon:22.94,feat:"非洲树种"},
{name:"猴面包树",sci:"Adansonia",type:"乔木",cli:"热带",con:"南非",lat:-22.56,lon:17.08,feat:"生命之树"},
{name:"帝王花",sci:"Protea",type:"灌木",cli:"地中海",con:"南非",lat:-33.92,lon:18.42,feat:"南非国花"},
{name:"桉树",sci:"Eucalyptus",type:"乔木",cli:"亚热带",con:"澳大利亚",lat:-25.27,lon:133.78,feat:"考拉主食"},
];

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,1000);
camera.position.z=2.5;

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
document.getElementById('container').appendChild(renderer.domElement);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.dampingFactor=0.05;
controls.minDistance=1.5;
controls.maxDistance=5;
controls.autoRotate=true;
controls.autoRotateSpeed=0.3;

// 地球组
const earthGroup=new THREE.Group();
scene.add(earthGroup);

// 地球
const texLoader=new THREE.TextureLoader();
const earthMat=new THREE.MeshPhongMaterial({color:0x1e90ff,specular:0x111111,shininess:10});
const earth=new THREE.Mesh(new THREE.SphereGeometry(1,64,64),earthMat);
earthGroup.add(earth);

// 贴图
texLoader.load('https://unpkg.com/three-globe@2.31.0/example/img/earth-blue-marble.jpg',t=>{earth.material.map=t;earth.material.needsUpdate=true});

// 大气层
const atmo=new THREE.Mesh(new THREE.SphereGeometry(1.02,64,64),new THREE.MeshBasicMaterial({color:0x4fc3f7,transparent:true,opacity:0.1,side:THREE.BackSide}));
earthGroup.add(atmo);

// 光照
scene.add(new THREE.AmbientLight(0x404050,1));
const sun=new THREE.DirectionalLight(0xffffff,1.2);
sun.position.set(5,3,5);
scene.add(sun);

// 星空
const starsG=new THREE.BufferGeometry();
const starsP=new Float32Array(2000*3);
for(let i=0;i<starsP.length;i++)starsP[i]=(Math.random()-0.5)*80;
starsG.setAttribute('position',new THREE.BufferAttribute(starsP,3));
scene.add(new THREE.Points(starsG,new THREE.PointsMaterial({color:0xffffff,size:0.04,opacity:0.5,transparent:true})));

// 标记
const mkGroup=new THREE.Group();
earthGroup.add(mkGroup);
const colors={'花卉':0xFF6B6B,'乔木':0x4CAF50,'灌木':0xFFB347,'多肉':0x87CEEB,'草本':0xDDA0DD};

function mk(p){
    const c=colors[p.type]||0xFFFFFF;
    const g=new THREE.Group();
    g.add(new THREE.Mesh(new THREE.CircleGeometry(0.03,16),new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:0.5})));
    g.add(new THREE.Mesh(new THREE.CircleGeometry(0.015,16),new THREE.MeshBasicMaterial({color:0xffffff})));
    const lat=p.lat*Math.PI/180,lon=-p.lon*Math.PI/180,r=1.01;
    g.position.set(r*Math.cos(lat)*Math.sin(lon),r*Math.sin(lat),r*Math.cos(lat)*Math.cos(lon));
    g.lookAt(0,0,0);g.rotateX(Math.PI/2);
    g.userData=p;
    return g;
}

function upd(){
    while(mkGroup.children.length)mkGroup.remove(mkGroup.children[0]);
    const tf=document.getElementById('tf').value,cf=document.getElementById('cf').value,cof=document.getElementById('cof').value;
    let n=0;
    data.forEach(p=>{if((tf==='all'||p.type===tf)&&(cf==='all'||p.cli===cf)&&(cof==='all'||p.con===cof)){mkGroup.add(mk(p));n++}});
    document.getElementById('total').innerText=data.length;
    document.getElementById('show').innerText=n;
}
upd();
['tf','cf','cof'].forEach(id=>document.getElementById(id).addEventListener('change',upd));

window.toggle=()=>{const f=document.getElementById('filters'),t=document.getElementById('toggle');f.classList.toggle('collapsed');t.innerText=f.classList.contains('collapsed')?'▶':'◀'};

const ray=new THREE.Raycaster();
addEventListener('click',e=>{
    if(e.target.closest('#filters')||e.target.closest('#detail')||e.target.closest('#legend'))return;
    ray.setFromCamera(new THREE.Vector2((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1),camera);
    const hit=ray.intersectObjects(mkGroup.children,true);
    if(hit.length){let m=hit[0].object;while(m.parent&&!m.userData)m=m.parent;if(m.userData){const p=m.userData;
        document.getElementById('dname').innerText=p.name;
        document.getElementById('dsci').innerText=p.sci;
        document.getElementById('dtype').innerText=p.type;
        document.getElementById('dcli').innerText=p.cli;
        document.getElementById('dcon').innerText=p.con;
        document.getElementById('dloc').innerText=p.lat.toFixed(2)+'° / '+p.lon.toFixed(2)+'°';
        document.getElementById('dfeat').innerText=p.feat;
        document.getElementById('detail').classList.add('active');
    }}
}});
window.closeD=()=>document.getElementById('detail').classList.remove('active');

document.getElementById('loading').style.display='none';

function anim(){requestAnimationFrame(anim);controls.update();renderer.render(scene,camera);}
anim();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
    </script>
</body>
</html>
