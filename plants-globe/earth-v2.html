<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球植物分布可视化 - 进阶版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        #title { position: absolute; top: 24px; left: 50%; transform: translateX(-50%); color: white; font-size: 28px; font-weight: 300; letter-spacing: 2px; z-index: 100; text-shadow: 0 2px 20px rgba(0,0,0,0.8); }
        #filters { position: absolute; top: 90px; left: 24px; background: linear-gradient(135deg, rgba(20,30,40,0.95), rgba(30,40,50,0.9)); padding: 24px; border-radius: 16px; color: white; z-index: 100; min-width: 220px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        #filters h3 { margin: 0 0 18px 0; font-size: 15px; color: #4CAF50; font-weight: 500; }
        .filter-group { margin-bottom: 16px; }
        .filter-group label { display: block; margin-bottom: 8px; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .filter-group select { width: 100%; padding: 10px 14px; background: rgba(40, 50, 60, 0.8); border: 1px solid rgba(255,255,255,0.15); color: white; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .filter-group select:hover { border-color: #4CAF50; }
        #stats { position: absolute; bottom: 24px; left: 24px; background: linear-gradient(135deg, rgba(20,30,40,0.95), rgba(30,40,50,0.9)); padding: 20px 28px; border-radius: 16px; color: white; z-index: 100; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        #stats p { margin: 8px 0; font-size: 14px; }
        #stats span { color: #4CAF50; font-weight: 600; }
        #popup { position: absolute; display: none; background: linear-gradient(135deg, rgba(25,35,45,0.98), rgba(35,45,55,0.95)); padding: 24px; border-radius: 16px; color: white; z-index: 200; min-width: 300px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid rgba(76, 175, 80, 0.3); }
        #popup h3 { margin: 0 0 16px 0; color: #4CAF50; font-size: 22px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        #popup p { margin: 12px 0; font-size: 14px; color: #ccc; }
        #popup .label { color: #666; font-size: 12px; }
        #popup .close { position: absolute; top: 16px; right: 16px; cursor: pointer; color: #666; font-size: 24px; }
        #legend { position: absolute; bottom: 24px; right: 24px; background: linear-gradient(135deg, rgba(20,30,40,0.95), rgba(30,40,50,0.9)); padding: 20px 24px; border-radius: 16px; color: white; z-index: 100; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        #legend h4 { margin: 0 0 14px 0; font-size: 13px; color: #888; }
        .legend-item { display: flex; align-items: center; margin: 10px 0; font-size: 13px; }
        .legend-dot { width: 14px; height: 14px; border-radius: 50%; margin-right: 12px; box-shadow: 0 0 10px currentColor; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #4CAF50; font-size: 18px; z-index: 300; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="title">🌍 全球植物分布</div>
    <div id="loading">加载中...</div>
    <div id="filters">
        <h3>🔍 筛选植物</h3>
        <div class="filter-group">
            <label>类型</label>
            <select id="typeFilter">
                <option value="all">全部</option>
                <option value="花卉">花卉</option>
                <option value="乔木">乔木</option>
                <option value="灌木">灌木</option>
                <option value="多肉">多肉</option>
                <option value="草本">草本</option>
            </select>
        </div>
        <div class="filter-group">
            <label>气候</label>
            <select id="climateFilter">
                <option value="all">全部</option>
                <option value="温带">温带</option>
                <option value="热带">热带</option>
                <option value="亚热带">亚热带</option>
                <option value="地中海">地中海</option>
                <option value="干旱">干旱</option>
            </select>
        </div>
        <div class="filter-group">
            <label>国家</label>
            <select id="countryFilter">
                <option value="all">全部</option>
                <option value="中国">中国</option>
                <option value="美国">美国</option>
                <option value="日本">日本</option>
                <option value="法国">法国</option>
                <option value="墨西哥">墨西哥</option>
                <option value="巴西">巴西</option>
                <option value="南非">南非</option>
                <option value="澳大利亚">澳大利亚</option>
            </select>
        </div>
    </div>
    <div id="stats">
        <p>🌿 总数 <span id="totalCount">0</span></p>
        <p>📍 显示 <span id="showCount">0</span></p>
    </div>
    <div id="legend">
        <h4>🌸 类型</h4>
        <div class="legend-item"><div class="legend-dot" style="background:#FF6B6B;color:#FF6B6B;"></div>花卉</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4CAF50;color:#4CAF50;"></div>乔木</div>
        <div class="legend-item"><div class="legend-dot" style="background:#FFB347;color:#FFB347;"></div>灌木</div>
        <div class="legend-item"><div class="legend-dot" style="background:#87CEEB;color:#87CEEB;"></div>多肉</div>
        <div class="legend-item"><div class="legend-dot" style="background:#DDA0DD;color:#DDA0DD;"></div>草本</div>
    </div>
    <div id="popup">
        <span class="close" onclick="closePopup()">×</span>
        <h3 id="popupName">植物名称</h3>
        <p><span class="label">学名</span><span id="popupScientific"></span></p>
        <p><span class="label">类型</span><span id="popupType"></span></p>
        <p><span class="label">气候</span><span id="popupClimate"></span></p>
        <p><span class="label">分布</span><span id="popupCountry"></span></p>
        <p><span class="label">特征</span><span id="popupFeature"></span></p>
    </div>
    <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
    <script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const plantsData = [
// 中国
{name:"桂花",scientific:"Osmanthus fragrans",type:"乔木",climate:"温带",country:"中国",lat:35.86,lon:104.19,feature:"中国传统名花"},
{name:"牡丹",scientific:"Paeonia suffruticosa",type:"灌木",climate:"温带",country:"中国",lat:34.74,lon:113.62,feature:"中国国花"},
{name:"梅花",scientific:"Prunus mume",type:"乔木",climate:"温带",country:"中国",lat:34.34,lon:108.94,feature:"岁寒三友"},
{name:"兰花",scientific:"Cymbidium",type:"草本",climate:"亚热带",country:"中国",lat:30.57,lon:114.30,feature:"十大名花之首"},
{name:"菊花",scientific:"Chrysanthemum",type:"草本",climate:"温带",country:"中国",lat:39.90,lon:116.41,feature:"四君子"},
{name:"杜鹃",scientific:"Rhododendron",type:"灌木",climate:"亚热带",country:"中国",lat:27.83,lon:112.94,feature:"世界四大高山花卉"},
{name:"荷花",scientific:"Nelumbo nucifera",type:"草本",climate:"温带",country:"中国",lat:30.57,lon:114.30,feature:"出淤泥而不染"},
{name:"竹子",scientific:"Bambusoideae",type:"乔木",climate:"亚热带",country:"中国",lat:29.56,lon:106.55,feature:"四君子"},
{name:"银杏",scientific:"Ginkgo biloba",type:"乔木",climate:"温带",country:"中国",lat:34.34,lon:108.94,feature:"活化石"},
{name:"红豆杉",scientific:"Taxus chinensis",type:"乔木",climate:"温带",country:"中国",lat:32.08,lon:118.80,feature:"国家一级保护"},
{name:"水杉",scientific:"Metasequoia",type:"乔木",climate:"亚热带",country:"中国",lat:30.67,lon:114.35,feature:"活化石"},
{name:"雪莲",scientific:"Saussurea",type:"草本",climate:"寒带",country:"中国",lat:43.10,lon:87.55,feature:"天山雪莲"},
{name:"人参",scientific:"Panax ginseng",type:"草本",climate:"温带",country:"中国",lat:41.80,lon:125.40,feature:"百草之王"},
// 美国
{name:"玫瑰",scientific:"Rosa rugosa",type:"灌木",climate:"温带",country:"美国",lat:38.90,lon:-77.04,feature:"爱情之花"},
{name:"金盏菊",scientific:"Calendula",type:"草本",climate:"温带",country:"美国",lat:34.05,lon:-118.24,feature:"富含维生素"},
{name:"巨杉",scientific:"Sequoiadendron",type:"乔木",climate:"温带",country:"美国",lat:36.58,lon:-118.29,feature:"世界最大树"},
{name:"红杉",scientific:"Sequoia sempervirens",type:"乔木",climate:"温带",country:"美国",lat:37.87,lon:-122.27,feature:"海岸红杉"},
{name:"仙人掌",scientific:"Cactaceae",type:"多肉",climate:"干旱",country:"美国",lat:32.73,lon:-117.16,feature:"多肉植物"},
{name:"糖枫",scientific:"Acer saccharum",type:"乔木",climate:"温带",country:"美国",lat:43.65,lon:-70.26,feature:"加拿大国树"},
// 日本
{name:"樱花",scientific:"Prunus serrulata",type:"乔木",climate:"温带",country:"日本",lat:35.68,lon:139.69,feature:"日本国花"},
{name:"红叶",scientific:"Acer palmatum",type:"乔木",climate:"温带",country:"日本",lat:35.01,lon:135.76,feature:"日本红枫"},
{name:"紫藤",scientific:"Wisteria",type:"藤本",climate:"温带",country:"日本",lat:34.73,lon:135.80,feature:"四大名藤"},
// 法国
{name:"薰衣草",scientific:"Lavandula",type:"灌木",climate:"地中海",country:"法国",lat:46.23,lon:2.21,feature:"普罗旺斯象征"},
{name:"橄榄",scientific:"Olea europaea",type:"乔木",climate:"地中海",country:"法国",lat:43.93,lon:7.26,feature:"和平象征"},
{name:"郁金香",scientific:"Tulipa",type:"草本",climate:"温带",country:"法国",lat:52.37,lon:4.90,feature:"荷兰国花"},
// 墨西哥
{name:"龙舌兰",scientific:"Agave americana",type:"多肉",climate:"干旱",country:"墨西哥",lat:23.63,lon:-102.55,feature:"酿酒原料"},
{name:"巨人柱",scientific:"Carnegiea gigantea",type:"多肉",climate:"干旱",country:"墨西哥",lat:31.78,lon:-111.13,feature:"世界最高仙人掌"},
{name:"大丽花",scientific:"Dahlia",type:"草本",climate:"温带",country:"墨西哥",lat:19.43,lon:-99.13,feature:"墨西哥国花"},
// 巴西
{name:"巴西木",scientific:"Dracaena",type:"乔木",climate:"热带",country:"巴西",lat:-15.78,lon:-47.93,feature:"幸福之树"},
{name:"蝴蝶兰",scientific:"Phalaenopsis",type:"草本",climate:"热带",country:"巴西",lat:-23.55,lon:-46.63,feature:"洋兰皇后"},
{name:"凤梨",scientific:"Ananas",type:"草本",climate:"热带",country:"巴西",lat:-3.11,lon:-60.03,feature:"热带水果"},
// 南非
{name:"金合欢",scientific:"Acacia",type:"乔木",climate:"热带",country:"南非",lat:-30.56,lon:22.94,feature:"非洲典型树种"},
{name:"猴面包树",scientific:"Adansonia digitata",type:"乔木",climate:"热带",country:"南非",lat:-22.56,lon:17.08,feature:"非洲生命之树"},
{name:"帝王花",scientific:"Protea cynaroides",type:"灌木",climate:"地中海",country:"南非",lat:-33.92,lon:18.42,feature:"南非国花"},
// 澳大利亚
{name:"桉树",scientific:"Eucalyptus",type:"乔木",climate:"亚热带",country:"澳大利亚",lat:-25.27,lon:133.78,feature:"考拉主食"},
{name:"金合欢",scientific:"Acacia pycnantha",type:"乔木",climate:"亚热带",country:"澳大利亚",lat:-33.87,lon:151.21,feature:"澳大利亚国花"},
];

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 2.5;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.getElementById('canvas-container').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 1.5;
controls.maxDistance = 5;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;

// 地球
const earthGeo = new THREE.SphereGeometry(1, 64, 64);
const earthMat = new THREE.MeshPhongMaterial({color:0x1a73e8,emissive:0x112244,specular:0x333333,shininess:20});
const earth = new THREE.Mesh(earthGeo, earthMat);
scene.add(earth);

// 大气层
const atmoGeo = new THREE.SphereGeometry(1.08, 64, 64);
const atmoMat = new THREE.MeshPhongMaterial({color:0x4fc3f7,transparent:true,opacity:0.12,side:THREE.BackSide});
const atmosphere = new THREE.Mesh(atmoGeo, atmoMat);
scene.add(atmosphere);

// 光照
scene.add(new THREE.AmbientLight(0x404040, 1.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5,3,5);
scene.add(dirLight);

// 星空
const starsGeo = new THREE.BufferGeometry();
const starsPos = new Float32Array(2000*3);
for(let i=0;i<starsPos.length;i++) starsPos[i] = (Math.random()-0.5)*80;
starsGeo.setAttribute('position',new THREE.BufferAttribute(starsPos,3));
scene.add(new THREE.Points(starsGeo,new THREE.PointsMaterial({color:0xffffff,size:0.06})));

// 标记点
const markerGroup = new THREE.Group();
scene.add(markerGroup);
const typeColors = {'花卉':0xFF6B6B,'乔木':0x4CAF50,'灌木':0xFFB347,'多肉':0x87CEEB,'草本':0xDDA0DD,'藤本':0x98D8C8};

function createMarker(p) {
    const color = typeColors[p.type]||0xFFFFFF;
    const group = new THREE.Group();
    
    const glowGeo = new THREE.CircleGeometry(0.03, 16);
    const glowMat = new THREE.MeshBasicMaterial({color:color,transparent:true,opacity:0.5});
    const glow = new THREE.Mesh(glowGeo, glowMat);
    
    const coreGeo = new THREE.CircleGeometry(0.015, 16);
    const coreMat = new THREE.MeshBasicMaterial({color:0xFFFFFF});
    const core = new THREE.Mesh(coreGeo, coreMat);
    core.position.z = 0.001;
    
    group.add(glow,core);
    
    const lat = p.lat*Math.PI/180, lon = -p.lon*Math.PI/180, r = 1.02;
    group.position.set(r*Math.cos(lat)*Math.sin(lon), r*Math.sin(lat), r*Math.cos(lat)*Math.cos(lon));
    group.lookAt(0,0,0);
    group.rotateX(Math.PI/2);
    group.userData = p;
    return group;
}

function updateMarkers() {
    while(markerGroup.children.length) markerGroup.remove(markerGroup.children[0]);
    const tf = document.getElementById('typeFilter').value;
    const cf = document.getElementById('climateFilter').value;
    const cof = document.getElementById('countryFilter').value;
    let count = 0;
    plantsData.forEach(p=>{
        if(tf!=='all'&&p.type!==tf) return;
        if(cf!=='all'&&p.climate!==cf) return;
        if(cof!=='all'&&p.country!==cof) return;
        markerGroup.add(createMarker(p));
        count++;
    });
    document.getElementById('totalCount').textContent = plantsData.length;
    document.getElementById('showCount').textContent = count;
}

updateMarkers();
document.getElementById('loading').style.display = 'none';

['typeFilter','climateFilter','countryFilter'].forEach(id=>{
    document.getElementById(id).addEventListener('change',updateMarkers);
});

// 点击
const raycaster = new THREE.Raycaster();
window.addEventListener('click',e=>{
    raycaster.setFromCamera(new THREE.Vector2((e.clientX/window.innerWidth)*2-1,-(e.clientY/window.innerHeight)*2+1),camera);
    const hits = raycaster.intersectObjects(markerGroup.children,true);
    if(hits.length){
        let m = hits[0].object;
        while(m.parent&&!m.userData) m=m.parent;
        if(m.userData){
            const p = m.userData;
            document.getElementById('popupName').textContent = p.name;
            document.getElementById('popupScientific').textContent = p.scientific;
            document.getElementById('popupType').textContent = p.type;
            document.getElementById('popupClimate').textContent = p.climate;
            document.getElementById('popupCountry').textContent = p.country;
            document.getElementById('popupFeature').textContent = p.feature;
            document.getElementById('popup').style.display = 'block';
            document.getElementById('popup').style.left = (e.clientX+15)+'px';
            document.getElementById('popup').style.top = (e.clientY-50)+'px';
        }
    }
});

window.closePopup = () => document.getElementById('popup').style.display = 'none';

window.addEventListener('resize',()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate(){ requestAnimationFrame(animate); controls.update(); renderer.render(scene,camera); }
animate();
    </script>
</body>
</html>
