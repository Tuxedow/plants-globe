<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球植物分布可视化 - 进阶版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: 'Segoe UI', Arial, sans-serif; }
        
        /* 标题 */
        #title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            z-index: 100;
        }
        
        /* 筛选面板 */
        #filters {
            position: absolute;
            top: 80px;
            left: 20px;
            background: rgba(20, 30, 40, 0.9);
            padding: 20px;
            border-radius: 12px;
            color: white;
            z-index: 100;
            min-width: 200px;
        }
        
        #filters h3 { margin: 0 0 15px 0; font-size: 16px; color: #4CAF50; }
        
        .filter-group { margin-bottom: 15px; }
        .filter-group label { display: block; margin-bottom: 5px; font-size: 12px; color: #aaa; }
        .filter-group select {
            width: 100%;
            padding: 8px;
            background: rgba(40, 50, 60, 0.8);
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }
        .filter-group select:hover { border-color: #4CAF50; }
        
        /* 统计 */
        #stats {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(20, 30, 40, 0.9);
            padding: 15px;
            border-radius: 12px;
            color: white;
            z-index: 100;
        }
        #stats p { margin: 5px 0; font-size: 13px; }
        #stats span { color: #4CAF50; font-weight: bold; }
        
        /* 弹窗 */
        #popup {
            position: absolute;
            display: none;
            background: rgba(20, 30, 40, 0.95);
            padding: 20px;
            border-radius: 12px;
            color: white;
            z-index: 200;
            max-width: 280px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid #4CAF50;
        }
        #popup h3 { margin: 0 0 10px 0; color: #4CAF50; font-size: 18px; }
        #popup p { margin: 8px 0; font-size: 13px; color: #ccc; }
        #popup .label { color: #888; font-size: 11px; }
        #popup .close {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            color: #666;
            font-size: 18px;
        }
        #popup .close:hover { color: white; }
        
        /* 图例 */
        #legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(20, 30, 40, 0.9);
            padding: 15px;
            border-radius: 12px;
            color: white;
            z-index: 100;
        }
        #legend h4 { margin: 0 0 10px 0; font-size: 14px; }
        .legend-item { display: flex; align-items: center; margin: 5px 0; font-size: 12px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
        
        /* 加载 */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #4CAF50;
            font-size: 18px;
            z-index: 300;
        }
    </style>
</head>
<body>
    <div id="title">🌍 全球植物分布可视化</div>
    
    <div id="loading">加载中...</div>
    
    <!-- 筛选面板 -->
    <div id="filters">
        <h3>🔍 筛选</h3>
        <div class="filter-group">
            <label>植物类型</label>
            <select id="typeFilter">
                <option value="all">全部</option>
                <option value="花卉">花卉</option>
                <option value="乔木">乔木</option>
                <option value="灌木">灌木</option>
                <option value="多肉">多肉</option>
            </select>
        </div>
        <div class="filter-group">
            <label>气候类型</label>
            <select id="climateFilter">
                <option value="all">全部</option>
                <option value="温带">温带</option>
                <option value="热带">热带</option>
                <option value="亚热带">亚热带</option>
                <option value="地中海">地中海</option>
                <option value="干旱">干旱</option>
            </select>
        </div>
        <div class="filter-group">
            <label>国家/地区</label>
            <select id="countryFilter">
                <option value="all">全部</option>
                <option value="中国">中国</option>
                <option value="美国">美国</option>
                <option value="墨西哥">墨西哥</option>
                <option value="法国">法国</option>
                <option value="南非">南非</option>
                <option value="澳大利亚">澳大利亚</option>
            </select>
        </div>
    </div>
    
    <!-- 统计 -->
    <div id="stats">
        <p>🌿 植物总数: <span id="totalCount">0</span></p>
        <p>📍 显示数量: <span id="showCount">0</span></p>
    </div>
    
    <!-- 图例 -->
    <div id="legend">
        <h4>🌸 植物类型</h4>
        <div class="legend-item"><div class="legend-dot" style="background: #FF6B6B;"></div>花卉</div>
        <div class="legend-item"><div class="legend-dot" style="background: #4CAF50;"></div>乔木</div>
        <div class="legend-item"><div class="legend-dot" style="background: #FFB347;"></div>灌木</div>
        <div class="legend-item"><div class="legend-dot" style="background: #87CEEB;"></div>多肉</div>
    </div>
    
    <!-- 弹窗 -->
    <div id="popup">
        <span class="close" onclick="closePopup()">×</span>
        <h3 id="popupName">植物名称</h3>
        <p><span class="label">学名:</span> <span id="popupScientific"></span></p>
        <p><span class="label">类型:</span> <span id="popupType"></span></p>
        <p><span class="label">气候:</span> <span id="popupClimate"></span></p>
        <p><span class="label">分布:</span> <span id="popupCountry"></span></p>
        <p><span class="label">特征:</span> <span id="popupFeature"></span></p>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        // ========== 植物数据 ==========
        const plantsData = [
            // 中国
            { name: "桂花", scientific: "Osmanthus fragrans", type: "乔木", climate: "温带", country: "中国", lat: 35.86, lon: 104.19, feature: "中国传统十大名花" },
            { name: "百合", scientific: "Lilium brownii", type: "花卉", climate: "温带", country: "中国", lat: 35.86, lon: 104.19, feature: "象征百年好合" },
            { name: "梅花", scientific: "Prunus mume", type: "乔木", climate: "温带", country: "中国", lat: 34.34, lon: 108.94, feature: "岁寒三友之一" },
            { name: "牡丹", scientific: "Paeonia suffruticosa", type: "灌木", climate: "温带", country: "中国", lat: 34.74, lon: 113.62, feature: "中国国花" },
            { name: "杜鹃", scientific: "Rhododendron simsii", type: "灌木", climate: "亚热带", country: "中国", lat: 30.57, lon: 114.30, feature: "世界四大高山花卉" },
            
            // 美国
            { name: "玫瑰", scientific: "Rosa rugosa", type: "灌木", climate: "温带", country: "美国", lat: 38.90, lon: -77.04, feature: "爱情象征" },
            { name: "金盏菊", scientific: "Calendula officinalis", type: "花卉", climate: "温带", country: "美国", lat: 34.05, lon: -118.24, feature: "富含维生素" },
            { name: "巨杉", scientific: "Sequoiadendron giganteum", type: "乔木", climate: "温带", country: "美国", lat: 36.58, lon: -118.29, feature: "世界最大的树" },
            
            // 墨西哥
            { name: "龙舌兰", scientific: "Agave americana", type: "多肉", climate: "干旱", country: "墨西哥", lat: 23.63, lon: -102.55, feature: "酿酒原料" },
            { name: "巨人柱", scientific: "Carnegiea gigantea", type: "多肉", climate: "干旱", country: "墨西哥", lat: 31.78, lon: -111.13, feature: "世界最高的仙人掌" },
            { name: "墨西哥罂粟", scientific: "Eschscholzia californica", type: "花卉", climate: "地中海", country: "墨西哥", lat: 25.54, lon: -103.40, feature: "加州州花" },
            
            // 法国/地中海
            { name: "薰衣草", scientific: "Lavandula angustifolia", type: "灌木", climate: "地中海", country: "法国", lat: 46.23, lon: 2.21, feature: "芳香植物之王" },
            { name: "无花果", scientific: "Ficus carica", type: "乔木", climate: "地中海", country: "法国", lat: 46.23, lon: 2.21, feature: "最古老的果树之一" },
            { name: "橄榄", scientific: "Olea europaea", type: "乔木", climate: "地中海", country: "法国", lat: 43.93, lon: 7.26, feature: "和平象征" },
            
            // 非洲
            { name: "金合欢", scientific: "Acacia senegal", type: "乔木", climate: "热带", country: "南非", lat: -30.56, lon: 22.94, feature: "非洲典型树种" },
            { name: "猴面包树", scientific: "Adansonia digitata", type: "乔木", climate: "热带", country: "南非", lat: -22.56, lon: 17.08, "feature": "非洲生命之树" },
            { name: "南非万寿菊", scientific: "Osteospermum", type: "花卉", climate: "热带", country: "南非", lat: -33.92, lon: 18.42, feature: "耐寒花卉" },
            
            // 澳大利亚
            { name: "桉树", scientific: "Eucalyptus globulus", type: "乔木", climate: "亚热带", country: "澳大利亚", lat: -25.27, lon: 133.78, feature: "考拉主食" },
            { name: "金合欢", scientific: "Acacia pycnantha", type: "乔木", climate: "亚热带", country: "澳大利亚", lat: -33.87, lon: 151.21, feature: "澳大利亚国花" },
            { name: "袋鼠爪", scientific: "Anigozanthus", type: "花卉", climate: "亚热带", country: "澳大利亚", lat: -31.95, lon: 115.86, feature: "澳大利亚特有" },
        ];
        
        // ========== Three.js 初始化 ==========
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 2.8;
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 1.5;
        controls.maxDistance = 5;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;
        
        // ========== 地球 ==========
        const earthGeometry = new THREE.SphereGeometry(1, 64, 64);
        const earthMaterial = new THREE.MeshPhongMaterial({
            color: 0x1a73e8,
            emissive: 0x112244,
            specular: 0x333333,
            shininess: 20,
        });
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earth);
        
        // 大气层光晕
        const atmosphereGeometry = new THREE.SphereGeometry(1.05, 64, 64);
        const atmosphereMaterial = new THREE.MeshPhongMaterial({
            color: 0x4fc3f7,
            transparent: true,
            opacity: 0.15,
            side: THREE.BackSide
        });
        const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
        scene.add(atmosphere);
        
        // ========== 光照 ==========
        const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
        directionalLight.position.set(5, 3, 5);
        scene.add(directionalLight);
        
        // ========== 星空 ==========
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 1500;
        const starsPositions = new Float32Array(starsCount * 3);
        for(let i = 0; i < starsCount * 3; i++) {
            starsPositions[i] = (Math.random() - 0.5) * 80;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08 });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);
        
        // ========== 植物标记点 ==========
        const plantMarkers = [];
        const markerGroup = new THREE.Group();
        scene.add(markerGroup);
        
        const typeColors = {
            '花卉': 0xFF6B6B,
            '乔木': 0x4CAF50,
            '灌木': 0xFFB347,
            '多肉': 0x87CEEB
        };
        
        function createMarker(plant) {
            const color = typeColors[plant.type] || 0xFFFFFF;
            
            // 光晕
            const glowGeometry = new THREE.CircleGeometry(0.025, 16);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.4
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            
            // 核心点
            const coreGeometry = new THREE.CircleGeometry(0.012, 16);
            const coreMaterial = new THREE.MeshBasicMaterial({ color: 0xFFFFFF });
            const core = new THREE.Mesh(coreGeometry, coreMaterial);
            core.position.z = 0.001;
            
            const marker = new THREE.Group();
            marker.add(glow);
            marker.add(core);
            
            // 经纬度转3D坐标
            const latRad = plant.lat * Math.PI / 180;
            const lonRad = -plant.lon * Math.PI / 180;
            const r = 1.01;
            
            marker.position.x = r * Math.cos(latRad) * Math.sin(lonRad);
            marker.position.y = r * Math.sin(latRad);
            marker.position.z = r * Math.cos(latRad) * Math.cos(lonRad);
            
            // 朝向地球外
            marker.lookAt(0, 0, 0);
            marker.rotateX(Math.PI / 2);
            
            marker.userData = plant;
            return marker;
        }
        
        function updateMarkers() {
            // 清除旧标记
            while(markerGroup.children.length > 0) {
                markerGroup.remove(markerGroup.children[0]);
            }
            plantMarkers.length = 0;
            
            const typeFilter = document.getElementById('typeFilter').value;
            const climateFilter = document.getElementById('climateFilter').value;
            const countryFilter = document.getElementById('countryFilter').value;
            
            let showCount = 0;
            
            plantsData.forEach(plant => {
                if (typeFilter !== 'all' && plant.type !== typeFilter) return;
                if (climateFilter !== 'all' && plant.climate !== climateFilter) return;
                if (countryFilter !== 'all' && plant.country !== countryFilter) return;
                
                const marker = createMarker(plant);
                markerGroup.add(marker);
                plantMarkers.push(marker);
                showCount++;
            });
            
            document.getElementById('totalCount').textContent = plantsData.length;
            document.getElementById('showCount').textContent = showCount;
        }
        
        // 初始加载
        updateMarkers();
        document.getElementById('loading').style.display = 'none';
        
        // ========== 筛选事件 ==========
        document.getElementById('typeFilter').addEventListener('change', updateMarkers);
        document.getElementById('climateFilter').addEventListener('change', updateMarkers);
        document.getElementById('countryFilter').addEventListener('change', updateMarkers);
        
        // ========== 点击交互 ==========
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        function onMouseClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(markerGroup.children, true);
            
            if (intersects.length > 0) {
                let marker = intersects[0].object;
                while (marker.parent && !marker.userData) {
                    marker = marker.parent;
                }
                
                if (marker.userData) {
                    showPopup(marker.userData, event.clientX, event.clientY);
                }
            }
        }
        
        window.addEventListener('click', onMouseClick);
        
        function showPopup(plant, x, y) {
            const popup = document.getElementById('popup');
            document.getElementById('popupName').textContent = plant.name;
            document.getElementById('popupScientific').textContent = plant.scientific;
            document.getElementById('popupType').textContent = plant.type;
            document.getElementById('popupClimate').textContent = plant.climate;
            document.getElementById('popupCountry').textContent = plant.country;
            document.getElementById('popupFeature').textContent = plant.feature;
            
            popup.style.display = 'block';
            popup.style.left = (x + 15) + 'px';
            popup.style.top = (y - 50) + 'px';
        }
        
        window.closePopup = function() {
            document.getElementById('popup').style.display = 'none';
        };
        
        // ========== 动画循环 ==========
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        // ========== 窗口调整 ==========
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        animate();
    </script>
</body>
</html>
